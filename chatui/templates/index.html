<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat &mdash; {{ model }}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #252525;
      --border: #2e2e2e;
      --text: #e8e8e8;
      --text-muted: #888;
      --accent: #7c6af7;
      --accent-hover: #9585ff;
      --user-bg: #1e2a3a;
      --user-border: #2a3f5a;
      --ai-bg: #1a1a1a;
      --error: #f87171;
      --scrollbar: #2e2e2e;
    }

    html, body { height: 100%; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* Header */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .header-left { display: flex; align-items: center; gap: 10px; }

    .logo {
      width: 28px; height: 28px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
    }

    h1 { font-size: 15px; font-weight: 600; letter-spacing: -0.2px; }

    .model-badge {
      font-size: 11px;
      color: var(--text-muted);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2px 8px;
      font-family: "SF Mono", "Fira Code", monospace;
    }

    .clear-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 6px;
      padding: 5px 10px;
      font-size: 12px;
      cursor: pointer;
      transition: color .15s, border-color .15s;
    }
    .clear-btn:hover { color: var(--text); border-color: #555; }

    /* Messages */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 0;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 4px; }

    .message-row {
      display: flex;
      padding: 4px 20px;
      max-width: 860px;
      margin: 0 auto;
      width: 100%;
      animation: fadeIn .2s ease;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

    .message-row.user { justify-content: flex-end; }
    .message-row.assistant { justify-content: flex-start; }

    .bubble {
      max-width: 72%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .user .bubble {
      background: var(--user-bg);
      border: 1px solid var(--user-border);
      border-bottom-right-radius: 4px;
    }

    .assistant .bubble {
      background: var(--ai-bg);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .bubble.error { color: var(--error); }

    .bubble.thinking {
      color: var(--text-muted);
      font-style: italic;
    }

    .cursor {
      display: inline-block;
      width: 2px;
      height: 14px;
      background: var(--accent);
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink .7s steps(1) infinite;
    }

    @keyframes blink { 50% { opacity: 0; } }

    /* Empty state */
    #empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-muted);
      gap: 8px;
      pointer-events: none;
    }

    #empty-state .icon { font-size: 36px; opacity: .4; }
    #empty-state p { font-size: 14px; opacity: .7; }

    /* Input area */
    #input-area {
      flex-shrink: 0;
      padding: 16px 20px;
      background: var(--surface);
      border-top: 1px solid var(--border);
    }

    .input-wrapper {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      max-width: 820px;
      margin: 0 auto;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 8px 8px 8px 14px;
      transition: border-color .15s;
    }

    .input-wrapper:focus-within { border-color: var(--accent); }

    #input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
      resize: none;
      max-height: 160px;
      overflow-y: auto;
      font-family: inherit;
    }

    #input::placeholder { color: var(--text-muted); }

    #input::-webkit-scrollbar { width: 4px; }
    #input::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 4px; }

    #send-btn {
      width: 34px; height: 34px;
      flex-shrink: 0;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s, transform .1s;
      color: #fff;
    }

    #send-btn:hover:not(:disabled) { background: var(--accent-hover); }
    #send-btn:active:not(:disabled) { transform: scale(.94); }
    #send-btn:disabled { opacity: .4; cursor: not-allowed; }

    #send-btn svg { width: 16px; height: 16px; fill: currentColor; }

    .hint {
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 8px;
      max-width: 820px;
      margin-left: auto;
      margin-right: auto;
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo">&#x25CB;</div>
    <h1>Chat</h1>
    <span class="model-badge">{{ model }}</span>
  </div>
  <button class="clear-btn" onclick="clearChat()">Clear</button>
</header>

<div id="messages">
  <div id="empty-state">
    <div class="icon">&#x2741;</div>
    <p>Send a message to start chatting</p>
  </div>
</div>

<div id="input-area">
  <div class="input-wrapper">
    <textarea id="input" rows="1" placeholder="Message..." autocomplete="off"></textarea>
    <button id="send-btn" onclick="sendMessage()">
      <svg viewBox="0 0 16 16"><path d="M1.5 1.5l13 6.5-13 6.5V9.5l9-2-9-2V1.5z"/></svg>
    </button>
  </div>
  <p class="hint">Enter to send &nbsp;&bull;&nbsp; Shift+Enter for newline</p>
</div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('send-btn');
  const emptyState = document.getElementById('empty-state');

  let history = [];
  let streaming = false;

  // Auto-resize textarea
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
  });

  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (!streaming) sendMessage();
    }
  });

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function appendMessage(role, text, extra = {}) {
    emptyState.style.display = 'none';
    const row = document.createElement('div');
    row.className = `message-row ${role}`;
    const bubble = document.createElement('div');
    bubble.className = 'bubble' + (extra.error ? ' error' : '');
    bubble.textContent = text;
    if (extra.withCursor) {
      const cursor = document.createElement('span');
      cursor.className = 'cursor';
      bubble.appendChild(cursor);
    }
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    scrollToBottom();
    return bubble;
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || streaming) return;

    inputEl.value = '';
    inputEl.style.height = 'auto';
    streaming = true;
    sendBtn.disabled = true;

    history.push({ role: 'user', content: text });
    appendMessage('user', text);

    const aiBubble = appendMessage('assistant', '', { withCursor: true });
    aiBubble.classList.add('thinking');
    aiBubble.textContent = '';
    const cursor = document.createElement('span');
    cursor.className = 'cursor';
    aiBubble.appendChild(cursor);

    let fullResponse = '';

    try {
      const resp = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history }),
      });

      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buf = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buf += decoder.decode(value, { stream: true });
        const lines = buf.split('\n');
        buf = lines.pop();

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const payload = line.slice(6);
          if (payload === '[DONE]') continue;
          try {
            const obj = JSON.parse(payload);
            if (obj.error) {
              aiBubble.classList.add('error');
              aiBubble.textContent = 'Error: ' + obj.error;
              fullResponse = '';
              break;
            }
            if (obj.content) {
              fullResponse += obj.content;
              aiBubble.classList.remove('thinking');
              aiBubble.textContent = fullResponse;
              aiBubble.appendChild(cursor);
              scrollToBottom();
            }
          } catch {}
        }
      }
    } catch (err) {
      aiBubble.classList.add('error');
      aiBubble.textContent = 'Connection error: ' + err.message;
    }

    // Remove cursor
    cursor.remove();
    if (!aiBubble.classList.contains('error') && fullResponse) {
      history.push({ role: 'assistant', content: fullResponse });
    }

    streaming = false;
    sendBtn.disabled = false;
    inputEl.focus();
  }

  function clearChat() {
    history = [];
    messagesEl.innerHTML = '';
    messagesEl.appendChild(emptyState);
    emptyState.style.display = '';
    inputEl.focus();
  }

  inputEl.focus();
</script>
</body>
</html>
