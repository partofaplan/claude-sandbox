apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: chat
  labels:
    app: ollama
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:latest
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              ollama serve &
              OLLAMA_PID=$!
              echo "Waiting for Ollama API..."
              until ollama list > /dev/null 2>&1; do
                sleep 2
              done
              echo "Pulling llama3.2:3b model..."
              ollama pull llama3.2:3b
              echo "Model ready. Serving..."
              wait $OLLAMA_PID
          ports:
            - name: http
              containerPort: 11434
          env:
            - name: OLLAMA_MODELS
              value: /models
          volumeMounts:
            - name: models
              mountPath: /models
          resources:
            requests:
              memory: "2Gi"
              cpu: "1"
            limits:
              memory: "6Gi"
              cpu: "4"
          readinessProbe:
            exec:
              command: ["/bin/sh", "-c", "ollama list 2>/dev/null | grep -q 'llama3.2'"]
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 90
          livenessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: ollama-models
