apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: chatui
  namespace: chat
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
    - host: chatbot.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: chatui
                port:
                  number: 80
